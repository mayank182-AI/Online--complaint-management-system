<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Complaint Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>  Complaint Dashboard</h1>
</header>

<div class="container">

  <aside class="sidebar">
    <h2>Menu</h2>
    <div onclick="showAll()">📋 All Complaints</div>
    <div onclick="clearData()">🗑 Clear All</div>
  </aside>

  <main class="main">

    <section class="cards">
      <div class="card total">Total<br><h2 id="total">0</h2></div>
      <div class="card pending">Pending<br><h2 id="pending">0</h2></div>
      <div class="card resolved">Resolved<br><h2 id="resolved">0</h2></div>
    </section>

    <section class="form">
      <h3>✨ Add New Complaint</h3>
      <input id="name" placeholder="Your Name">
      <input id="title" placeholder="Complaint Title">
      <select id="category">
        <option>⚡ Electricity</option>
        <option>🌐 Internet</option>
        <option>💧 Water</option>
        <option>🛣 Road</option>
      </select>
      <textarea id="desc" placeholder="Describe your issue..."></textarea>
      <button onclick="addComplaint()">Submit Complaint</button>
    </section>

    <section class="filters">
      <input id="search" placeholder="🔍 Search complaints..." onkeyup="search()">
      <select id="filter" onchange="filterStatus()">
        <option value="all">All</option>
        <option value="Pending">Pending</option>
        <option value="Resolved">Resolved</option>
      </select>
    </section>

    <section class="complaints" id="complaints"></section>

  </main>
</div>

<footer>💡 Designed Smartly | 2026</footer>

<script type="module" src="script.js"></script>
</body>
</html>
